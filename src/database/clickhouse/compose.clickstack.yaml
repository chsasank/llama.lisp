name: clickstack
services:
    db:
        image: mongo:5.0.32-focal
        volumes:
            - ./mongodb:/data/db
    otel-collector:
        image: docker.clickhouse.com/clickhouse/clickstack-otel-collector:2
        environment:
            CLICKHOUSE_ENDPOINT: ${CLICKHOUSE_ENDPOINT}
            CLICKHOUSE_USER: ${CLICKHOUSE_OTEL_USERNAME}
            CLICKHOUSE_PASSWORD: ${CLICKHOUSE_OTEL_PASSWORD}
            HYPERDX_OTEL_EXPORTER_CLICKHOUSE_DATABASE: ${CLICKHOUSE_OTEL_DATABASE}
            HYPERDX_LOG_LEVEL: ${HYPERDX_LOG_LEVEL}
            # TODO: use new schema
            HYPERDX_OTEL_EXPORTER_CREATE_LEGACY_SCHEMA: "true"
        ports:
            - "13133:13133" # health_check extension
            - "24225:24225" # fluentd receiver
            - "34317:4317" # OTLP gRPC receiver
            - "34318:4318" # OTLP http receiver
            - "38888:8888" # metrics extension
        restart: always
    app:
        image: docker.hyperdx.io/hyperdx/hyperdx:2
        ports:
            - ${HYPERDX_API_PORT}:${HYPERDX_API_PORT}
            - ${HYPERDX_APP_PORT}:${HYPERDX_APP_PORT}
        environment:
            FRONTEND_URL: ${HYPERDX_APP_URL}:${HYPERDX_APP_PORT}
            HYPERDX_API_KEY: ${HYPERDX_API_KEY}
            HYPERDX_API_PORT: ${HYPERDX_API_PORT}
            HYPERDX_APP_PORT: ${HYPERDX_APP_PORT}
            HYPERDX_APP_URL: ${HYPERDX_APP_URL}
            HYPERDX_LOG_LEVEL: ${HYPERDX_LOG_LEVEL}
            MINER_API_URL: "http://miner:5123"
            MONGO_URI: "mongodb://db:27017/hyperdx"
            SERVER_URL: http://127.0.0.1:${HYPERDX_API_PORT}
            OPAMP_PORT: ${HYPERDX_OPAMP_PORT}
            OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
            OTEL_SERVICE_NAME: "hdx-oss-app"
            USAGE_STATS_ENABLED: ${USAGE_STATS_ENABLED:-true}
            DEFAULT_CONNECTIONS: '[{"name":"Local
                ClickHouse","host":"${CLICKHOUSE_HOST}","username":"${CLICKHOUSE_OTEL_USERNAME}","password":"${CLICKHOUSE_OTEL_PASSWORD}"}]'
            DEFAULT_SOURCES:
                '[{"from":{"databaseName":"${CLICKHOUSE_OTEL_DATABASE}","tableName":"otel_logs"},"kind":"log","timestampValueExpression":"TimestampTime","name":"Logs","displayedTimestampValueExpression":"Timestamp","implicitColumnExpression":"Body","serviceNameExpression":"ServiceName","bodyExpression":"Body","eventAttributesExpression":"LogAttributes","resourceAttributesExpression":"ResourceAttributes","defaultTableSelectExpression":"Timestamp,ServiceName,SeverityText,Body","severityTextExpression":"SeverityText","traceIdExpression":"TraceId","spanIdExpression":"SpanId","connection":"Local
                ClickHouse","traceSourceId":"Traces","sessionSourceId":"Sessions","metricSourceId":"Metrics"},{"from":{"databaseName":"${CLICKHOUSE_OTEL_DATABASE}","tableName":"otel_traces"},"kind":"trace","timestampValueExpression":"Timestamp","name":"Traces","displayedTimestampValueExpression":"Timestamp","implicitColumnExpression":"SpanName","serviceNameExpression":"ServiceName","eventAttributesExpression":"SpanAttributes","resourceAttributesExpression":"ResourceAttributes","defaultTableSelectExpression":"Timestamp,ServiceName,StatusCode,round(Duration/1e6),SpanName","traceIdExpression":"TraceId","spanIdExpression":"SpanId","durationExpression":"Duration","durationPrecision":9,"parentSpanIdExpression":"ParentSpanId","spanNameExpression":"SpanName","spanKindExpression":"SpanKind","statusCodeExpression":"StatusCode","statusMessageExpression":"StatusMessage","connection":"Local
                ClickHouse","logSourceId":"Logs","sessionSourceId":"Sessions","metricSourceId":"Metrics"},{"from":{"databaseName":"${CLICKHOUSE_OTEL_DATABASE}","tableName":""},"kind":"metric","timestampValueExpression":"TimeUnix","name":"Metrics","resourceAttributesExpression":"ResourceAttributes","metricTables":{"gauge":"otel_metrics_gauge","histogram":"otel_metrics_histogram","sum":"otel_metrics_sum","_id":"682586a8b1f81924e628e808","id":"682586a8b1f81924e628e808"},"connection":"Local
                ClickHouse","logSourceId":"Logs","traceSourceId":"Traces","sessionSourceId":"Sessions"},{"from":{"databaseName":"${CLICKHOUSE_OTEL_DATABASE}","tableName":"hyperdx_sessions"},"kind":"session","timestampValueExpression":"TimestampTime","name":"Sessions","displayedTimestampValueExpression":"Timestamp","implicitColumnExpression":"Body","serviceNameExpression":"ServiceName","bodyExpression":"Body","eventAttributesExpression":"LogAttributes","resourceAttributesExpression":"ResourceAttributes","defaultTableSelectExpression":"Timestamp,ServiceName,SeverityText,Body","severityTextExpression":"SeverityText","traceIdExpression":"TraceId","spanIdExpression":"SpanId","connection":"Local
                ClickHouse","logSourceId":"Logs","traceSourceId":"Traces","metricSourceId":"Metrics"}]'
        depends_on:
            - db
